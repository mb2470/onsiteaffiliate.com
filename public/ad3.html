<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onsite Affiliate – Rich Media Ad</title>
<meta name="ad.size" content="width=1080,height=1920">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #9015ed;
    --blue: #245ef9;
    --deep: #4a3fed;
    --lavender: #c6beee;
    --dark: #01081e;
  }

  body {
    margin: 0 auto; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #070711;
    overflow: hidden;
    background: var(--dark);
    font-family: 'Sora', sans-serif;
  }

  .ad {
    aspect-ratio: 1080 / 1920;
    max-width: 1080px;
    max-height: min(1920px, 100vh);
    height: 100vh;
    width: auto;
    position: relative;
    overflow: hidden;
    background: var(--dark);
    cursor: pointer;
  }

  /* ===== BACKGROUND ===== */
  .bg { position: absolute; inset: 0; z-index: 0; }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(130px);
    will-change: transform, opacity;
  }

  .orb-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(144,21,237,0.22), transparent 70%);
    top: -250px; left: -150px;
    animation: floatOrb1 20s ease-in-out infinite;
  }
  .orb-2 {
    width: 550px; height: 550px;
    background: radial-gradient(circle, rgba(36,94,249,0.18), transparent 70%);
    bottom: -250px; right: -100px;
    animation: floatOrb2 22s ease-in-out infinite;
  }
  .orb-3 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(74,63,237,0.15), transparent 70%);
    top: 35%; left: 50%;
    animation: floatOrb3 18s ease-in-out infinite;
  }

  @keyframes floatOrb1 {
    0%,100% { transform: translate(0,0) scale(1); opacity: 0.6; }
    33% { transform: translate(80px,60px) scale(1.15); opacity: 0.9; }
    66% { transform: translate(30px,80px) scale(1.05); opacity: 0.7; }
  }
  @keyframes floatOrb2 {
    0%,100% { transform: translate(0,0) scale(1); opacity: 0.5; }
    33% { transform: translate(-70px,-40px) scale(1.1); opacity: 0.8; }
    66% { transform: translate(-40px,-70px) scale(1.05); opacity: 0.6; }
  }
  @keyframes floatOrb3 {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.4; }
    50% { transform: translate(calc(-50% + 40px), calc(-50% - 30px)) scale(1.2); opacity: 0.7; }
  }

  .grain {
    position: absolute; inset: 0; z-index: 1; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  .sweep {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(90deg,
      transparent 0%, rgba(197,157,255,0.04) 45%,
      rgba(197,157,255,0.08) 50%, rgba(36,94,249,0.04) 55%,
      transparent 100%);
    background-size: 200% 100%;
    animation: lightSweep 8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes lightSweep {
    0%,100% { background-position: 200% 0; }
    50% { background-position: -100% 0; }
  }

  /* ===== LOGO ===== */
  .logo {
    position: absolute; top: clamp(12px, 2.33vw, 28px); left: clamp(16px, 3.67vw, 44px); z-index: 100;
    display: flex; align-items: center; gap: 10px;
    opacity: 0; animation: softFadeIn 0.8s ease 0.3s forwards;
  }
  .logo img { width: 40px; height: auto; }
  .logo .wordmark {
    font-size: clamp(9px, 1.6vw, 17px); font-weight: 700; letter-spacing: clamp(1.2px, 0.3vw, 3.5px);
    text-transform: uppercase; color: rgba(255,255,255,0.5);
  }

  /* ===== CARD SYSTEM ===== */
  .stage {
    position: absolute; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }

  .card {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; padding: 5vw 4vw;
    opacity: 0; pointer-events: none;
  }

  .card h2 {
    font-weight: 700; line-height: 1.2; color: #fff;
    text-align: center; max-width: 94vw;
  }

  .card h2 .em {
    background: linear-gradient(135deg, #c59dff, var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Word animation */
  .card .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(28px) rotateX(40deg) scale(1);
    filter: blur(4px);
    transition: none;
  }

  /* Card 1 gets extra dramatic entrance */
  .card-1 .word {
    transform: translateY(50px) rotateX(60deg) scale(0.85);
    filter: blur(8px);
  }

  .card .word.visible {
    opacity: 1;
    transform: translateY(0) rotateX(0deg) scale(1);
    filter: blur(0);
  }

  /* Card sizes */
  .card-1 h2 { font-size: clamp(34px, 7.5vw, 82px); font-weight: 800; }
  .card-2 h2 { font-size: clamp(34px, 7.5vw, 82px); font-weight: 800; }
  .card-3 h2 { font-size: clamp(34px, 7.5vw, 82px); font-weight: 800; }
  .card-4 h2 { font-size: clamp(34px, 7.5vw, 82px); font-weight: 800; }
  .card-5 h2 { font-size: clamp(34px, 7.5vw, 82px); font-weight: 800; }
  .card-6 h2 { font-size: clamp(34px, 7.5vw, 82px); font-weight: 800; }
  .card-7 h2 { font-size: clamp(34px, 7.5vw, 82px); font-weight: 800; }

  /* ===== CRASH-IN EFFECT (Cards 2 & 5) ===== */
  .crash-card h2 {
    opacity: 0;
    transform: scale(2.5);
    filter: blur(12px);
  }

  .crash-card.active h2 {
    animation: crashIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes crashIn {
    0% {
      opacity: 0;
      transform: scale(2.5);
      filter: blur(12px);
    }
    70% {
      opacity: 1;
      transform: scale(0.95);
      filter: blur(0);
    }
    100% {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }
  }

  /* Instant-appear cards (3, 6) */
  .instant-card.active h2 {
    animation: instantIn 0.25s ease forwards;
  }

  @keyframes instantIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  /* Card exit */
  .card.exiting {
    animation: cardFadeOut 0.4s cubic-bezier(0.4,0,1,1) forwards;
  }

  @keyframes cardFadeOut {
    0% { opacity: 1; transform: scale(1); filter: blur(0); }
    100% { opacity: 0; transform: scale(0.96); filter: blur(8px); }
  }

  /* ===== CARD 8 — CTA ===== */
  .card-8 {
    padding: 5vw 4vw !important;
  }

  .card-8 .cta-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }

  .logo-big {
    opacity: 0; transform: scale(0.6);
  }

  .logo-big-img {
    width: clamp(200px, 40vw, 430px);
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 0 50px rgba(144, 21, 237, 0.35));
  }

  .logo-big.visible {
    opacity: 1; transform: scale(1);
  }

  .cta-button {
    display: inline-flex; align-items: center; justify-content: center; text-align: center; gap: 12px;
    padding: clamp(18px, 3vw, 32px) clamp(38px, 7vw, 76px); border-radius: 100px;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: #fff; font-family: 'Sora', sans-serif;
    font-size: clamp(18px, 3vw, 32px); font-weight: 700; text-decoration: none;
    letter-spacing: 0.3px;
    opacity: 0; transform: translateY(24px) scale(0.92);
    box-shadow: 0 10px 50px rgba(144,21,237,0.4);
    transition: box-shadow 0.35s, transform 0.35s;
    position: relative; overflow: hidden;
  }

  .cta-button::before {
    content: '';
    position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.6s ease;
  }
  .cta-button:hover::before { left: 100%; }
  .cta-button:hover {
    box-shadow: 0 16px 60px rgba(144,21,237,0.6), 0 0 0 5px rgba(144,21,237,0.12);
    transform: translateY(-3px) scale(1) !important;
  }
  .cta-button .arrow {
    display: inline-block; transition: transform 0.35s; font-size: 20px;
  }
  .cta-button:hover .arrow { transform: translateX(6px); }
  .cta-button.visible { opacity: 1; transform: translateY(0) scale(1); }

  @keyframes ctaGlow {
    0%,100% { box-shadow: 0 10px 50px rgba(144,21,237,0.4), 0 0 0 0 rgba(144,21,237,0); }
    50% { box-shadow: 0 10px 50px rgba(144,21,237,0.4), 0 0 0 12px rgba(144,21,237,0.08); }
  }
  .cta-button.pulsing { animation: ctaGlow 2.5s ease-in-out infinite; }

  /* Brand tag */
  .brand-tag {
    position: absolute; bottom: clamp(8px, 1.83vw, 22px); right: clamp(16px, 3.67vw, 44px); z-index: 100;
    font-size: clamp(9px, 1.4vw, 15px); font-weight: 600; letter-spacing: clamp(0.8px, 0.125vw, 1.5px);
    color: rgba(255,255,255,0.2);
    opacity: 0; animation: softFadeIn 1s ease 1s forwards;
  }

  /* Progress */
  .progress {
    position: absolute; bottom: 0; left: 0; height: 3px; z-index: 100;
    background: linear-gradient(90deg, var(--purple), var(--blue));
    width: 0%; transition: width 0.15s linear;
  }

  @keyframes softFadeIn { to { opacity: 1; } }

  .play-btn {
    position: absolute; top: clamp(12px, 2.33vw, 28px); right: clamp(16px, 3.67vw, 44px);
    z-index: 200; width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.6);
    color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px); transition: all 0.3s;
  }
  .play-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
</style>
</head>

    card6: { text: "A creator UGC flywheel that drives *measurable sales.*" },
    card7: { text: "Now you can launch an *Onsite Commission program* for your site too!" },
    ctaText: "Estimate My Sales Lift Now"
  };

  // Fetch content JSON, fall back to defaults
  let contentData = defaultText;
  try {
    const resp = await fetch('/content/ad-headlines.json?v=' + Date.now());
    if (resp.ok) contentData = await resp.json();
  } catch(e) { /* use defaults */ }

  // Build headlines array from config + content
  const headlines = cardConfig.map(cfg => {
    const entry = cfg.key ? (contentData[cfg.key] || defaultText[cfg.key] || {}) : {};
    return {
      id: cfg.id,
      type: cfg.type,
      tokens: entry.text ? parseText(entry.text) : [],
      wordDelay: cfg.wordDelay,
      wordDuration: cfg.wordDuration
    };
  });

  // Update CTA button text
  const ctaText = contentData.ctaText || defaultText.ctaText;
  const ctaBtnEl = document.getElementById('ctaBtn');
  if (ctaBtnEl && ctaBtnEl.childNodes[0]) {
    ctaBtnEl.childNodes[0].textContent = ctaText + ' ';
  }


  /* Build word spans */
  headlines.forEach(h => {
    if (!h.tokens.length) return;
    const card = document.getElementById(h.id);
    const h2 = card.querySelector('h2');
    if (!h2) return;

    if (h.type === 'crash') {
      // Crash cards: no per-word animation, just set text
      h2.innerHTML = h.tokens.map(([text, cls]) => {
        return cls ? `<span class="${cls}">${text}</span>` : text;
      }).join(' ');
    } else if (h.type === 'instant') {
      // Instant cards: set text, will fade in as block
      h2.innerHTML = h.tokens.map(([text, cls]) => {
        return cls ? `<span class="${cls}">${text}</span>` : text;
      }).join(' ');
    } else {
      // Build cards: per-word animation
      h2.innerHTML = h.tokens.map(([text, cls]) => {
        const spanClass = cls ? `word ${cls}` : 'word';
        return `<span class="${spanClass}" style="transition: opacity ${h.wordDuration}ms cubic-bezier(0.16,1,0.3,1), transform ${h.wordDuration}ms cubic-bezier(0.16,1,0.3,1), filter ${h.wordDuration}ms cubic-bezier(0.16,1,0.3,1); transition-delay: 0ms;">${text}</span> `;
      }).join('');
    }
  });

  /*
   * TIMELINE — 17 seconds total
   * Card 1: 0–3s      (build 2s + hold 1s)
   * Card 2: 3–4s      (crash + hold 1s)
   * Card 3: 4–6s      (instant + hold 2s)
   * Card 4: 6–9s      (build 1s + hold 2s)
   * Card 5: 9–10s     (crash + hold 1s)
   * Card 6: 10–12s    (instant + hold 2s)
   * Card 7: 12–15s    (build 2s + hold 1s)
   * Card 8: 15–17s    (instant logo+CTA + hold)
   */

  const TIMELINE = [
    // 2s blank buffer at start

    // Card 1: build word-by-word ~2s + hold 3s = 5s
    [2000,   'showCard',    0],
    [2100,   'revealWords', 0],
    [6700,   'exitCard',    0],

    // Card 2: crash in + hold 1s
    [7000,   'showCrash',   1],
    [7700,   'exitCard',    1],

    // Card 3: instant + hold 2s
    [8000,   'showInstant', 2],
    [9700,   'exitCard',    2],

    // Card 4: build ~1s + hold 2s = 3s
    [10000,  'showCard',    3],
    [10100,  'revealWords', 3],
    [12700,  'exitCard',    3],

    // Card 5: crash in + hold 1s
    [13000,  'showCrash',   4],
    [13700,  'exitCard',    4],

    // Card 6: instant + hold 2s
    [14000,  'showInstant', 5],
    [15700,  'exitCard',    5],

    // Card 7: build ~2s + hold 3s = 5s
    [16000,  'showCard',    6],
    [16100,  'revealWords', 6],
    [20700,  'exitCard',    6],

    // Card 8: logo + CTA (instant, stays — auto-pause here)
    [21000,  'showCard',    7],
    [21000,  'showLogo'],
    [21000,  'showCTA'],
    [24000,  'autoPause'],
  ];

  const TOTAL_DURATION = 26000; // 2s buffer + 17s content + 5s CTA hold + 2s buffer
  const progress = document.getElementById('progress');
  const ctaBtn = document.getElementById('ctaBtn');
  const allCards = headlines.map(h => document.getElementById(h.id));

  let startTime = null;
  let fired = new Set();

  function resetAll() {
    fired.clear();
    allCards.forEach((card) => {
      card.style.opacity = '0';
      card.style.pointerEvents = 'none';
      card.classList.remove('exiting', 'active');
      card.querySelectorAll('.word').forEach(w => {
        w.classList.remove('visible');
        w.style.transitionDelay = '0ms';
      });
    });
    ctaBtn.style.opacity = '0';
    ctaBtn.style.transform = 'translateY(24px) scale(0.92)';
    ctaBtn.classList.remove('visible', 'pulsing');
    const logoBig = document.querySelector('.logo-big');
    if (logoBig) { logoBig.classList.remove('visible'); logoBig.style.transition = 'none'; }
    progress.style.width = '0%';
  }

  function autoPause() {
    paused = true;
    pausedAt = 0;
    startTime = null;
    playBtn.textContent = '↺';
    playBtn.style.opacity = '1';
    playBtn.style.pointerEvents = 'auto';
  }

  function showCard(index) {
    const card = allCards[index];
    card.style.opacity = '1';
    card.style.pointerEvents = 'auto';
  }

  function revealWords(index) {
    const card = allCards[index];
    const words = card.querySelectorAll('.word');
    const delay = headlines[index].wordDelay;
    words.forEach((w, i) => {
      w.style.transitionDelay = `${i * delay}ms`;
      requestAnimationFrame(() => w.classList.add('visible'));
    });
  }

  function showCrash(index) {
    const card = allCards[index];
    card.style.opacity = '1';
    card.style.pointerEvents = 'auto';
    card.classList.add('active');
  }

  function showInstant(index) {
    const card = allCards[index];
    card.style.opacity = '1';
    card.style.pointerEvents = 'auto';
    card.classList.add('active');
  }

  function exitCard(index) {
    allCards[index].classList.add('exiting');
  }

  function showLogo() {
    const logo = document.querySelector('.logo-big');
    if (logo) {
      logo.style.transition = 'opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1)';
      requestAnimationFrame(() => logo.classList.add('visible'));
    }
  }

  function showCTA() {
    ctaBtn.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    requestAnimationFrame(() => {
      ctaBtn.classList.add('visible');
      setTimeout(() => ctaBtn.classList.add('pulsing'), 600);
    });
  }

  const actions = { showCard, revealWords, exitCard, showCrash, showInstant, showLogo, showCTA, autoPause };

  let paused = true;
  let pausedAt = 0;
  const playBtn = document.getElementById('playBtn');

  function tick(timestamp) {
    if (paused) {
      startTime = null;
      requestAnimationFrame(tick);
      return;
    }

    if (!startTime) startTime = timestamp - pausedAt;
    const elapsed = timestamp - startTime;

    progress.style.width = Math.min(elapsed / TOTAL_DURATION * 100, 100) + '%';

    TIMELINE.forEach(([time, action, ...args], i) => {
      if (elapsed >= time && !fired.has(i)) {
        fired.add(i);
        actions[action](...args);
      }
    });

    requestAnimationFrame(tick);
  }

  playBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (playBtn.textContent === '↺') {
      // Replay from start
      resetAll();
      pausedAt = 0;
      paused = false;
      startTime = null;
      playBtn.textContent = '⏸';
      playBtn.style.opacity = '0';
      playBtn.style.pointerEvents = 'none';
    } else if (paused) {
      paused = false;
      playBtn.style.opacity = '0';
      playBtn.style.pointerEvents = 'none';
    } else {
      paused = true;
      if (startTime) pausedAt = performance.now() - startTime;
      playBtn.textContent = '▶';
      playBtn.style.opacity = '1';
      playBtn.style.pointerEvents = 'auto';
    }
  });

  requestAnimationFrame(tick);
})();
</script>

</body>
</html>
