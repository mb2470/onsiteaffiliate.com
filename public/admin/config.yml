backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "site-content"
    label: "Site Content"
    files:
      # ─── HOMEPAGE ───
      - name: "homepage"
        label: "Homepage"
        file: "src/content/homepage.json"
        fields:
          - { name: "heroHeadline", label: "Hero Headline", widget: "string" }
          - { name: "heroHighlight", label: "Hero Highlighted Text (gradient)", widget: "string" }
          - { name: "heroHeadlineEnd", label: "Hero Headline End", widget: "string" }
          - { name: "missingLinkHeadline", label: "Missing Link Section Headline", widget: "text" }
          - { name: "comparisonHeadline", label: "Comparison Section Headline", widget: "text" }
          - { name: "bottomStatement1", label: "Bottom Statement Line 1", widget: "string" }
          - { name: "bottomStatement2", label: "Bottom Statement Line 2", widget: "string" }
          - name: "steps"
            label: "How It Works Steps"
            widget: "list"
            fields:
              - { name: "step", label: "Step Name", widget: "string" }
              - { name: "bold", label: "Bold Text", widget: "string" }
              - { name: "desc", label: "Description", widget: "string" }

      # ─── ABOUT PAGE ───
      - name: "about"
        label: "About Page"
        file: "src/content/about.json"
        fields:
          - { name: "missionSubtitle", label: "Mission Subtitle", widget: "text" }
          - { name: "whoWeAre1", label: "Who We Are - Paragraph 1", widget: "text" }
          - { name: "whoWeAre2", label: "Who We Are - Paragraph 2", widget: "text" }
          - name: "team"
            label: "Team Members"
            widget: "list"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - { name: "role", label: "Role", widget: "string" }
              - { name: "bio", label: "Bio", widget: "text" }

      # ─── SOLUTIONS ───
      - name: "solutions-ecommerce"
        label: "Solutions: E-Commerce"
        file: "src/content/solutions-ecommerce.json"
        fields:
          - { name: "headline", label: "Headline", widget: "text" }
          - { name: "subtitle", label: "Subtitle", widget: "text" }
          - name: "pills"
            label: "Feature Cards"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "desc", label: "Description", widget: "text" }

      - name: "solutions-brand-social"
        label: "Solutions: Brand & Social"
        file: "src/content/solutions-brand-social.json"
        fields:
          - { name: "headline", label: "Headline", widget: "text" }
          - { name: "subtitle", label: "Subtitle", widget: "text" }
          - name: "pills"
            label: "Feature Cards"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "desc", label: "Description", widget: "text" }

      - name: "solutions-measurement"
        label: "Solutions: Measurement"
        file: "src/content/solutions-measurement.json"
        fields:
          - { name: "headline", label: "Headline", widget: "text" }
          - { name: "subtitle", label: "Subtitle", widget: "text" }
          - name: "pills"
            label: "Feature Cards"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "desc", label: "Description", widget: "text" }

      # ─── FAQ ───
      - name: "faq"
        label: "FAQ"
        file: "src/content/faq.json"
        fields:
          - name: "faqs"
            label: "FAQ Items"
            widget: "list"
            fields:
              - { name: "q", label: "Question", widget: "string" }
              - { name: "a", label: "Answer", widget: "text" }
